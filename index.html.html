<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>메타몽 키우기</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pk:#ff6eb4;--pp:#b57bee;--pp3:#7c3aed;--pk3:#d94f96;
  --bg:#f5f0ff;--bd:#ecd9ff;--tx:#2d1b4e;--mu:#9b7bb8;
  --gn:#26de81;--gd:#f5c842;--rd:#ff5c5c;--sk:#45aaf2;--or:#ff9f43;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx)}
.app{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;position:relative}
.b1,.b2{position:fixed;border-radius:50%;filter:blur(70px);opacity:.12;pointer-events:none;z-index:0}
.b1{width:350px;height:350px;background:var(--pp);top:-80px;right:-80px}
.b2{width:300px;height:300px;background:var(--pk);bottom:-80px;left:-80px}
/* HEADER */
.hdr{padding:10px 16px 0;display:flex;align-items:center;justify-content:space-between;z-index:2;flex-shrink:0}
.ttl{font-family:'Gmarket Sans',sans-serif;font-size:16px;background:linear-gradient(135deg,var(--pp3),var(--pk3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-r{display:flex;gap:6px}
.bdg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.bdg-c{background:#fff;border:1.5px solid var(--bd);color:var(--pp3)}
.bdg-p{background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff}
/* TABS */
.tabs{display:flex;margin:8px 16px 0;background:#fff;border-radius:12px;padding:3px;box-shadow:0 2px 10px rgba(181,123,238,.1);border:1px solid var(--bd);flex-shrink:0;z-index:2}
.tab{flex:1;padding:6px 0;text-align:center;font-size:10px;font-weight:700;border-radius:9px;cursor:pointer;color:var(--mu);border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.tab.on{background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;box-shadow:0 2px 10px rgba(181,123,238,.35)}
/* PAGES */
.pages{flex:1;overflow:hidden;position:relative;z-index:1}
.pg{display:none;height:100%;overflow-y:auto;overflow-x:hidden;padding-bottom:16px}
.pg::-webkit-scrollbar{width:3px}
.pg::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.pg.on{display:block}
/* ROOM */
.room-top{padding:7px 16px 0;display:flex;align-items:center;justify-content:space-between}
.coin-info{font-size:11px;font-weight:700;color:var(--pp3)}
.coin-hint{font-size:10px;color:var(--mu)}
.canvas-wrap{margin:8px 16px 0;border-radius:16px;overflow:hidden;border:2px solid var(--bd);box-shadow:0 6px 24px rgba(181,123,238,.2)}
canvas{display:block;width:100%;height:auto;image-rendering:pixelated;image-rendering:crisp-edges}
.speech{margin:8px 16px 0;background:#fff;border-radius:12px;padding:9px 13px;border:1.5px solid var(--bd);font-size:11px;line-height:1.6;position:relative;min-height:42px;transition:opacity .25s}
.speech::before{content:'메타몽';position:absolute;top:-8px;left:11px;background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;font-size:9px;font-weight:700;padding:1px 7px;border-radius:6px;font-family:'Gmarket Sans',sans-serif}
.mood-row{margin:7px 16px 0;display:flex;align-items:center;gap:7px}
.mood-lbl{font-size:10px;color:var(--mu);white-space:nowrap}
.mood-tr{flex:1;height:6px;background:rgba(181,123,238,.15);border-radius:4px;overflow:hidden;border:1px solid var(--bd)}
.mood-fl{height:100%;background:linear-gradient(90deg,var(--pp),var(--pk));border-radius:4px;transition:width .8s}
.mood-pc{font-size:10px;color:var(--mu)}
.sht-row{display:flex;margin:10px 16px 0;gap:6px}
.sht{flex:1;padding:6px;text-align:center;font-size:11px;font-weight:700;border-radius:9px;border:1.5px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.sht.on{background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;border-color:transparent}
.shop-ttl{margin:8px 16px 0;font-size:10px;font-weight:700;color:var(--pp3)}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:6px 16px 0}
.sc{background:#fff;border:1.5px solid var(--bd);border-radius:11px;padding:8px 5px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.sc:hover:not(.lk):not(.np){transform:translateY(-2px);box-shadow:0 5px 16px rgba(181,123,238,.18);border-color:var(--pp)}
.sc.lk{opacity:.38;cursor:not-allowed}.sc.np{opacity:.5;cursor:not-allowed}
.sc.ow{border-color:var(--gn);background:#f0fff8}.sc.pl{border-color:var(--gd);background:#fffbf0}
.se{font-size:22px;line-height:1}.sn{font-size:9px;color:var(--tx);margin-top:2px;font-weight:700}
.sp{font-size:8px;color:var(--pp);margin-top:1px;font-weight:700}
.sbg{position:absolute;top:2px;right:2px;font-size:7px;padding:1px 3px;border-radius:5px;font-weight:700}
.sbg.ow{background:var(--gn);color:#fff}.sbg.pl{background:var(--gd);color:#fff}
/* TIMER */
.timer-pg{padding:12px 16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.auto-card{width:100%;background:#fff;border-radius:14px;padding:12px 14px;border:1.5px solid var(--bd)}
.auto-row{display:flex;align-items:center;justify-content:space-between}
.auto-lbl{font-size:12px;font-weight:700;color:var(--pp3)}.auto-sub{font-size:10px;color:var(--mu);margin-top:2px}
.sw{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#ddd;border-radius:22px;transition:.3s}
.sl::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+.sl{background:linear-gradient(135deg,var(--pp),var(--pk))}
.sw input:checked+.sl::before{transform:translateX(18px)}
.chain{display:flex;align-items:center;gap:3px;margin-top:8px;flex-wrap:wrap}
.cd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:1.5px solid var(--bd);background:var(--bg);transition:all .3s}
.cd.dp{background:linear-gradient(135deg,var(--pp),var(--pk));border:none;color:#fff}
.cd.ap{background:var(--or);border:none;color:#fff}
.cd.bs{background:var(--gn);border:none;color:#fff}
.cd.bl{background:var(--sk);border:none;color:#fff}
.ca{font-size:9px;color:var(--mu)}
.task-card{width:100%;background:#fff;border-radius:14px;padding:12px 14px;border:1.5px solid var(--bd)}
.task-ttl{font-size:11px;font-weight:700;color:var(--pp3);margin-bottom:7px}
.task-row{display:flex;gap:7px}
.task-inp{flex:1;background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;padding:7px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--tx);outline:none}
.task-inp:focus{border-color:var(--pp)}
.task-add{padding:7px 12px;background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.tl{margin-top:7px;display:flex;flex-direction:column;gap:4px;max-height:100px;overflow-y:auto}
.ti{display:flex;align-items:center;gap:7px;padding:5px 9px;background:var(--bg);border-radius:7px;border:1px solid var(--bd);font-size:11px}
.tk{width:14px;height:14px;border-radius:50%;border:2px solid var(--pp);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;transition:all .2s}
.tk.d{background:var(--gn);border-color:var(--gn);color:#fff}
.tt{flex:1}.tt.d{text-decoration:line-through;color:var(--mu)}
.td2{color:var(--mu);cursor:pointer;font-size:13px}
.timer-card{width:100%;background:#fff;border-radius:18px;padding:16px 14px 14px;box-shadow:0 6px 28px rgba(181,123,238,.11);border:1.5px solid var(--bd);display:flex;flex-direction:column;align-items:center;gap:6px}
.time-inputs{display:flex;align-items:center;gap:8px}
.ti-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.ti-lbl{font-size:9px;color:var(--mu)}
.ti-inp{width:46px;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;padding:5px;font-size:14px;font-family:'Gmarket Sans',sans-serif;color:var(--tx);text-align:center;outline:none;font-weight:700}
.ti-inp:focus{border-color:var(--pp)}
.ti-sep{font-size:18px;font-weight:700;color:var(--mu);margin-bottom:12px}
.mpills{display:flex;gap:6px}
.mp{padding:4px 11px;border-radius:18px;font-size:10px;font-weight:700;border:1.5px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.mp.on{background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;border-color:transparent}
.rw{position:relative;width:155px;height:155px;margin:4px 0}
.rw svg{transform:rotate(-90deg);position:absolute;top:0;left:0}
.rbg{stroke:#f0e4ff;fill:none;stroke-width:8}
.rp{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ri{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rt{font-family:'Gmarket Sans',sans-serif;font-size:36px;font-weight:700;color:var(--tx);line-height:1}
.rs{font-size:9px;color:var(--mu)}
.ctrl{display:flex;gap:8px;margin-top:2px}
.btn-s{padding:10px 22px;background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 5px 18px rgba(181,123,238,.38);font-family:'Gmarket Sans',sans-serif;transition:all .2s}
.btn-r{padding:10px 12px;background:var(--bg);color:var(--mu);border:1.5px solid var(--bd);border-radius:12px;font-size:14px;cursor:pointer;transition:all .2s}
.pdots-card{width:100%;background:#fff;border-radius:13px;padding:10px 12px;border:1.5px solid var(--bd)}
.pdots-ttl{font-size:10px;font-weight:700;color:var(--pp3);margin-bottom:7px}
.pdots{display:flex;flex-wrap:wrap;gap:5px}
.pd{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--pp),var(--pk));display:flex;align-items:center;justify-content:center;font-size:13px;animation:dp .4s cubic-bezier(.22,1,.36,1)}
@keyframes dp{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.pde{width:24px;height:24px;border-radius:50%;border:2px dashed var(--bd)}
/* RANK */
.rank-pg{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.rank-hero{background:linear-gradient(135deg,var(--pp),var(--pk));border-radius:16px;padding:14px;color:#fff;display:flex;align-items:center;gap:12px}
.rank-hero-av{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.25);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-hero-av img{width:46px;height:46px;object-fit:contain}
.rank-hero-info{flex:1}
.rank-hero-name{font-family:'Gmarket Sans',sans-serif;font-size:14px;font-weight:700}
.rank-hero-sub{font-size:10px;opacity:.85;margin-top:2px}
.rank-hero-pos{font-family:'Gmarket Sans',sans-serif;font-size:30px;font-weight:700}
.rank-list{display:flex;flex-direction:column;gap:7px}
.ri2{background:#fff;border:1.5px solid var(--bd);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px;box-shadow:0 2px 8px rgba(181,123,238,.07)}
.ri2.me{border-color:var(--pp);background:rgba(181,123,238,.08)}
.ri2.r1{border-color:#f5c842}.ri2.r2{border-color:#b0b8c1}.ri2.r3{border-color:#cd7f32}
.rpos{font-family:'Gmarket Sans',sans-serif;font-size:15px;font-weight:700;color:var(--mu);width:22px;text-align:center;flex-shrink:0}
.rpos.g{color:#f5c842}.rpos.s{color:#b0b8c1}.rpos.b{color:#cd7f32}
.rav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.rav img{width:34px;height:34px;object-fit:contain}
.rinfo{flex:1}
.rname{font-size:11px;font-weight:700;color:var(--tx)}
.rstat{font-size:9px;color:var(--mu);margin-top:1px}
.rbar-w{margin-top:3px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.rbar{height:100%;background:linear-gradient(90deg,var(--pp),var(--pk));border-radius:2px;transition:width 1s}
.rscore{text-align:right}
.rsn{font-family:'Gmarket Sans',sans-serif;font-size:13px;font-weight:700;color:var(--pp3)}
.rsl{font-size:8px;color:var(--mu)}
.rank-btn{width:100%;padding:9px;background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;color:var(--pp3);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
/* CALENDAR */
.cal-pg{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.mon-sum{background:#fff;border-radius:13px;padding:10px 12px;border:1.5px solid var(--bd);display:flex;gap:8px}
.ms-bx{flex:1;text-align:center}
.ms-n{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--pp3),var(--pk3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ms-l{font-size:8px;color:var(--mu);margin-top:1px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:8px 13px;border:1.5px solid var(--bd)}
.cal-nav{background:none;border:none;font-size:17px;cursor:pointer;color:var(--pp3);padding:0 5px}
.cal-ttl{font-family:'Gmarket Sans',sans-serif;font-size:14px;font-weight:700}
.cal-gh{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cdow{font-size:9px;font-weight:700;color:var(--mu);padding:3px 0}
.cdow:first-child{color:var(--rd)}.cdow:last-child{color:var(--sk)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cc{background:#fff;border-radius:8px;padding:4px 3px;min-height:42px;border:1.5px solid var(--bd);cursor:pointer;transition:all .2s}
.cc:hover{border-color:var(--pp)}
.cc.today{border-color:var(--pp);background:rgba(181,123,238,.1)}
.cc.other{opacity:.3}.cc.sel{border-color:var(--pk);background:#fff0fa}.cc.has{background:linear-gradient(160deg,#f9f0ff,#fff)}
.cdate{font-size:10px;font-weight:700}.cc.today .cdate{color:var(--pp3)}
.cpdots{display:flex;flex-wrap:wrap;gap:1px;margin-top:2px}
.cpdot{width:5px;height:5px;border-radius:50%;background:linear-gradient(135deg,var(--pp),var(--pk))}
.cpc{font-size:7px;color:var(--pp3);font-weight:700;margin-top:1px}
.day-det{background:#fff;border-radius:13px;padding:12px 13px;border:1.5px solid var(--bd)}
.dd-ttl{font-size:11px;font-weight:700;color:var(--pp3);margin-bottom:9px;display:flex;justify-content:space-between}
.dd-stats{display:flex;gap:8px;margin-bottom:9px}
.st-bx{flex:1;background:var(--bg);border-radius:8px;padding:7px;text-align:center;border:1px solid var(--bd)}
.st-n{font-family:'Gmarket Sans',sans-serif;font-size:15px;font-weight:700;color:var(--pp3)}
.st-l{font-size:8px;color:var(--mu);margin-top:1px}
.dtl{display:flex;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto}
.dt-i{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:7px;font-size:10px;border:1px solid var(--bd);background:var(--bg)}
.dt-d{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dt-d.dn{background:var(--gn)}.dt-d.pd{background:var(--mu)}
.de{font-size:11px;color:var(--mu);text-align:center;padding:10px 0}
/* CHAT */
.chat-pg{display:flex;flex-direction:column;height:100%}
.chat-hdr{display:flex;align-items:center;gap:9px;margin:8px 16px 0;padding:8px 12px;background:#fff;border-radius:12px;border:1.5px solid var(--bd);flex-shrink:0}
.chat-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e0c8ff,#ffb3d9);overflow:hidden;display:flex;align-items:center;justify-content:center}
.chat-av img{width:32px;height:32px;object-fit:contain}
.c-nm{font-weight:700;font-size:12px}.c-st{font-size:10px;color:var(--gn)}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:8px 16px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.msg{display:flex;gap:6px;align-items:flex-end;animation:mIn .3s}
@keyframes mIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse}
.m-av{width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,#e0c8ff,#ffb3d9)}
.m-av img{width:24px;height:24px;object-fit:contain}
.m-bub{max-width:76%;padding:7px 11px;border-radius:13px;font-size:11px;line-height:1.55}
.msg.m .m-bub{background:#fff;border:1.5px solid var(--bd);color:var(--tx);border-bottom-left-radius:3px}
.msg.u .m-bub{background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;border-bottom-right-radius:3px}
.m-t{font-size:9px;color:var(--mu);margin-top:1px;padding:0 2px}
.typing{display:flex;gap:3px;align-items:center;padding:7px 11px;background:#fff;border:1.5px solid var(--bd);border-radius:13px;border-bottom-left-radius:3px;width:fit-content}
.td3{width:5px;height:5px;border-radius:50%;background:var(--pp);animation:tb 1.2s ease-in-out infinite}
.td3:nth-child(2){animation-delay:.2s}.td3:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-4px);opacity:1}}
.chat-inp-row{display:flex;gap:7px;padding:7px 16px 8px;border-top:1.5px solid var(--bd);flex-shrink:0}
.chat-inp{flex:1;background:#fff;border:1.5px solid var(--bd);border-radius:15px;padding:8px 13px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--tx);outline:none}
.chat-inp:focus{border-color:var(--pp)}
.chat-snd{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pp),var(--pk));border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* COMPLETION */
.co{position:fixed;inset:0;background:rgba(245,240,255,.93);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .4s}
.co.on{opacity:1;pointer-events:all}
.cc2{background:#fff;border-radius:22px;padding:22px 18px;max-width:300px;width:90%;text-align:center;border:2px solid var(--bd);box-shadow:0 20px 60px rgba(181,123,238,.25);animation:cp .5s cubic-bezier(.22,1,.36,1)}
@keyframes cp{from{transform:scale(.7) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.co-img{width:80px;height:80px;object-fit:contain;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.co-ttl{font-family:'Gmarket Sans',sans-serif;font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--pp3),var(--pk3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:6px 0 3px}
.co-task{font-size:12px;color:var(--pp3);font-weight:700;margin-bottom:3px;background:rgba(181,123,238,.1);border-radius:9px;padding:5px 10px}
.co-msg{font-size:11px;color:var(--mu);line-height:1.6;margin-bottom:10px}
.co-coin{font-size:12px;font-weight:700;color:var(--pp3);margin-bottom:8px}
.co-rw{background:linear-gradient(135deg,#fff0fa,#f0e4ff);border-radius:10px;padding:9px;margin-bottom:10px;border:1.5px solid var(--bd)}
.co-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--pp),var(--pk));color:#fff;border:none;border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif}
.cfp{position:fixed;border-radius:2px;pointer-events:none;z-index:300;animation:cff linear forwards}
@keyframes cff{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.ffx{position:fixed;pointer-events:none;z-index:350;font-size:18px;animation:fu 1.1s ease-out forwards}
@keyframes fu{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:#fff;font-size:10px;font-weight:700;padding:7px 14px;border-radius:16px;z-index:400;transition:transform .3s;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="b1"></div><div class="b2"></div>
<div class="app">
  <div class="hdr">
    <div class="ttl">🔮 메타몽 키우기</div>
    <div class="hdr-r">
      <div class="bdg bdg-c" id="cb">🪙 0</div>
      <div class="bdg bdg-p" id="pb">🍅 0회</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="showPg('room')">🏠 방</button>
    <button class="tab" onclick="showPg('timer')">⏱ 타이머</button>
    <button class="tab" onclick="showPg('rank')">🏆 순위</button>
    <button class="tab" onclick="showPg('cal')">📅 달력</button>
    <button class="tab" onclick="showPg('chat')">💬 채팅</button>
  </div>
  <div class="pages">
    <!-- ROOM -->
    <div class="pg on" id="pg-room">
      <div class="room-top">
        <div class="coin-info">🪙 <span id="coin-disp">0 뽀모</span></div>
        <div class="coin-hint">1뽀모도로 = 10뽀모</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="rc" width="390" height="300"></canvas>
      </div>
      <div class="speech" id="speech">안녕! 내 방이야~ 🥰 아래서 가구 사고 배치해봐!</div>
      <div class="mood-row">
        <span class="mood-lbl">💜 기분</span>
        <div class="mood-tr"><div class="mood-fl" id="mf" style="width:50%"></div></div>
        <span class="mood-pc" id="mp">50%</span>
      </div>
      <div class="sht-row">
        <button class="sht on" onclick="setShop('f')">🛋️ 가구 (40종)</button>
        <button class="sht" onclick="setShop('s')">🍿 간식 (12종)</button>
      </div>
      <div class="shop-ttl" id="shop-ttl">🛋️ 가구 상점</div>
      <div class="shop-grid" id="shop-grid"></div>
    </div>
    <!-- TIMER -->
    <div class="pg" id="pg-timer">
      <div class="timer-pg">
        <div class="auto-card">
          <div class="auto-row">
            <div><div class="auto-lbl">🔄 자동 사이클</div><div class="auto-sub" id="auto-sub">수동 모드</div></div>
            <label class="sw"><input type="checkbox" id="auto-chk" onchange="toggleAuto()"><span class="sl"></span></label>
          </div>
          <div class="chain" id="chain"></div>
        </div>
        <div class="task-card">
          <div class="task-ttl">📝 이번 뽀모도로 할 일</div>
          <div class="task-row">
            <input class="task-inp" id="task-inp" placeholder="할 일 입력..." onkeydown="if(event.key==='Enter')addTask()">
            <button class="task-add" onclick="addTask()">추가</button>
          </div>
          <div class="tl" id="tl"></div>
        </div>
        <div class="timer-card">
          <div class="mpills">
            <button class="mp on" onclick="setMode('f')">🍅 집중</button>
            <button class="mp" onclick="setMode('s')">☕ 짧은휴식</button>
            <button class="mp" onclick="setMode('l')">🌙 긴휴식</button>
          </div>
          <div class="time-inputs">
            <div class="ti-wrap"><span class="ti-lbl">분</span><input class="ti-inp" id="ti-m" type="number" min="0" max="99" value="25" onchange="applyTime()"></div>
            <span class="ti-sep">:</span>
            <div class="ti-wrap"><span class="ti-lbl">초</span><input class="ti-inp" id="ti-s" type="number" min="0" max="59" value="0" onchange="applyTime()"></div>
          </div>
          <div class="rw">
            <svg width="155" height="155" viewBox="0 0 155 155">
              <defs>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#b57bee"/><stop offset="100%" stop-color="#ff6eb4"/></linearGradient>
                <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#26de81"/><stop offset="100%" stop-color="#45aaf2"/></linearGradient>
                <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#45aaf2"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
              </defs>
              <circle class="rbg" cx="77.5" cy="77.5" r="67"/>
              <circle class="rp" id="rp" cx="77.5" cy="77.5" r="67" stroke="url(#g1)" stroke-dasharray="421" stroke-dashoffset="0"/>
            </svg>
            <div class="ri"><div class="rt" id="clk">25:00</div><div class="rs" id="mlbl">집중 시간</div></div>
          </div>
          <div class="ctrl">
            <button class="btn-s" id="stbtn" onclick="toggleTimer()">▶ 시작</button>
            <button class="btn-r" onclick="resetTimer()">↺</button>
          </div>
        </div>
        <div class="pdots-card">
          <div class="pdots-ttl">오늘의 집중 🍅</div>
          <div class="pdots" id="pdots"></div>
        </div>
      </div>
    </div>
    <!-- RANK -->
    <div class="pg" id="pg-rank">
      <div class="rank-pg">
        <div class="rank-hero">
          <div class="rank-hero-av"><img id="rank-img" style="width:46px;height:46px;object-fit:contain"></div>
          <div class="rank-hero-info">
            <div class="rank-hero-name">나 (집중러)</div>
            <div class="rank-hero-sub" id="rank-sub">총 0회 · 0분</div>
          </div>
          <div class="rank-hero-pos" id="rank-pos">#-</div>
        </div>
        <div class="rank-list" id="rank-list"></div>
        <button class="rank-btn" onclick="tickRivals();showToast('🔄 라이벌 업데이트!')">🔄 라이벌 업데이트</button>
      </div>
    </div>
    <!-- CALENDAR -->
    <div class="pg" id="pg-cal">
      <div class="cal-pg">
        <div class="mon-sum" id="mon-sum"></div>
        <div class="cal-hdr">
          <button class="cal-nav" onclick="calNav(-1)">&#8249;</button>
          <div class="cal-ttl" id="cal-ttl"></div>
          <button class="cal-nav" onclick="calNav(1)">&#8250;</button>
        </div>
        <div class="cal-gh">
          <div class="cdow">일</div><div class="cdow">월</div><div class="cdow">화</div>
          <div class="cdow">수</div><div class="cdow">목</div><div class="cdow">금</div><div class="cdow">토</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="day-det" id="day-det" style="display:none"></div>
      </div>
    </div>
    <!-- CHAT -->
    <div class="pg" id="pg-chat">
      <div class="chat-pg">
        <div class="chat-hdr">
          <div class="chat-av"><img id="chat-av-img" style="width:32px;height:32px;object-fit:contain"></div>
          <div><div class="c-nm">메타몽</div><div class="c-st">● 온라인</div></div>
        </div>
        <div class="msgs" id="msgs">
          <div class="msg m">
            <div class="m-av"><img id="chat-init-av" style="width:24px;height:24px;object-fit:contain"></div>
            <div><div class="m-bub">어머! 왔어? 😊 나 메타몽이야~ 같이 열심히 해보자!</div><div class="m-t">지금</div></div>
          </div>
        </div>
        <div class="chat-inp-row">
          <input class="chat-inp" id="chat-inp" placeholder="메타몽에게 말 걸기..." onkeydown="if(event.key==='Enter')sendChat()">
          <button class="chat-snd" onclick="sendChat()">&#9658;</button>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- COMPLETION -->
<div class="co" id="co">
  <div class="cc2">
    <img class="co-img" id="co-img">
    <div class="co-ttl">뽀모도로 완료! 🎉</div>
    <div class="co-task" id="co-task" style="display:none"></div>
    <div class="co-msg" id="co-msg"></div>
    <div class="co-coin">+10 🪙 뽀모 획득!</div>
    <div class="co-rw" id="co-rw" style="display:none">
      <div style="font-size:9px;color:var(--mu);margin-bottom:4px;font-weight:700;letter-spacing:1px">🎁 새 가구 해금!</div>
      <div style="font-size:24px" id="co-rw-e"></div>
      <div style="font-size:10px;color:var(--pp3);font-weight:700;margin-top:3px" id="co-rw-n"></div>
    </div>
    <button class="co-btn" onclick="closeCo()">방 보러 가기 🏠</button>
  </div>
</div>
<div class="toast" id="toast"></div>

var cv = document.getElementById('rc');
var cx = cv.getContext('2d');
var CW = cv.width, CH = cv.height;
var RW=7, RD=6, RH=4;
var TX=28, TY=14;
var OX=CW/2, OY=CH*0.88;

function iso(gx,gy,gz) {
  return { x: OX+(gx-gy)*TX, y: OY-(gx+gy)*TY-gz*TX };
}
function sn(v){ return Math.round(v); }
function poly(pts, fill, stroke) {
  cx.beginPath();
  pts.forEach(function(p,i){ i===0?cx.moveTo(sn(p.x),sn(p.y)):cx.lineTo(sn(p.x),sn(p.y)); });
  cx.closePath();
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=0.8;cx.stroke();}
}
function tile(gx,gy,col) {
  poly([iso(gx,gy,0),iso(gx+1,gy,0),iso(gx+1,gy+1,0),iso(gx,gy+1,0)],col,'rgba(0,0,0,0.07)');
}
function isoBox(gx,gy,gz,gw,gd,gh,ct,cl,cr) {
  poly([iso(gx,gy,gz+gh),iso(gx+gw,gy,gz+gh),iso(gx+gw,gy+gd,gz+gh),iso(gx,gy+gd,gz+gh)],ct,'rgba(0,0,0,0.1)');
  poly([iso(gx,gy+gd,gz+gh),iso(gx+gw,gy+gd,gz+gh),iso(gx+gw,gy+gd,gz),iso(gx,gy+gd,gz)],cl,'rgba(0,0,0,0.1)');
  poly([iso(gx+gw,gy,gz+gh),iso(gx+gw,gy+gd,gz+gh),iso(gx+gw,gy+gd,gz),iso(gx+gw,gy,gz)],cr,'rgba(0,0,0,0.1)');
}

function drawRoom() {
  cx.clearRect(0,0,CW,CH);
  cx.imageSmoothingEnabled = false;
  cx.fillStyle='#f0e8d8'; cx.fillRect(0,0,CW,CH);

  // Ceiling
  poly([iso(0,0,RH),iso(RW,0,RH),iso(RW,RD,RH),iso(0,RD,RH)],'#e8e0c8',null);
  // Back wall
  poly([iso(0,0,RH),iso(RW,0,RH),iso(RW,0,0),iso(0,0,0)],'#f4e8d0','rgba(0,0,0,0.05)');
  cx.strokeStyle='rgba(200,180,140,0.22)'; cx.lineWidth=1;
  for(var x=0;x<=RW;x++){var ta=iso(x,0,RH),ba=iso(x,0,0);cx.beginPath();cx.moveTo(sn(ta.x),sn(ta.y));cx.lineTo(sn(ba.x),sn(ba.y));cx.stroke();}
  // Left wall
  poly([iso(0,0,RH),iso(0,RD,RH),iso(0,RD,0),iso(0,0,0)],'#e8d8b8','rgba(0,0,0,0.05)');
  cx.strokeStyle='rgba(180,155,110,0.2)'; cx.lineWidth=1;
  for(var y=0;y<=RD;y++){var tb=iso(0,y,RH),bb=iso(0,y,0);cx.beginPath();cx.moveTo(sn(tb.x),sn(tb.y));cx.lineTo(sn(bb.x),sn(bb.y));cx.stroke();}
  // Floor
  var fc=['#c8a870','#bc9c64'];
  for(var fx=0;fx<RW;fx++) for(var fy=0;fy<RD;fy++) tile(fx,fy,fc[(fx+fy)%2]);
  cx.strokeStyle='rgba(150,100,50,0.15)'; cx.lineWidth=0.5;
  for(var fx2=0;fx2<=RW;fx2++){var fa=iso(fx2,0,0),fb=iso(fx2,RD,0);cx.beginPath();cx.moveTo(sn(fa.x),sn(fa.y));cx.lineTo(sn(fb.x),sn(fb.y));cx.stroke();}
  for(var fy2=0;fy2<=RD;fy2++){var fc2=iso(0,fy2,0),fd=iso(RW,fy2,0);cx.beginPath();cx.moveTo(sn(fc2.x),sn(fc2.y));cx.lineTo(sn(fd.x),sn(fd.y));cx.stroke();}
  // Skirting
  for(var sx=0;sx<RW;sx++) poly([iso(sx,0,0.25),iso(sx+1,0,0.25),iso(sx+1,0,0),iso(sx,0,0)],'#b89060',null);
  for(var sy=0;sy<RD;sy++) poly([iso(0,sy,0.25),iso(0,sy+1,0.25),iso(0,sy+1,0),iso(0,sy,0)],'#b89060',null);
  // Window
  drawWindow(2.5,0,1.5);
  // Wall pics
  drawPic(0.5,0,2.5,1.0,1.4,'#f8e8d8','#8B6F47');
  drawPic(5.5,0,2.0,0.9,1.2,'#d8eef8','#4a80a0');
  // Ceiling lamp
  var lc=iso(RW/2,RD/2,RH);
  cx.fillStyle='rgba(255,240,180,0.45)';cx.beginPath();cx.ellipse(sn(lc.x),sn(lc.y),18,9,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#f0e060';cx.beginPath();cx.ellipse(sn(lc.x),sn(lc.y),5,2.5,0,0,Math.PI*2);cx.fill();
  // Furniture sorted by depth
  var sorted = roomFurns.slice().sort(function(a,b){return (a.gx+a.gy)-(b.gx+b.gy);});
  sorted.forEach(function(f){drawFurn(f);});
  // Shadow
  var sp=iso(metaS.gx,metaS.gy,0);
  cx.fillStyle='rgba(80,40,120,0.14)';cx.beginPath();cx.ellipse(sn(sp.x),sn(sp.y),15,7,0,0,Math.PI*2);cx.fill();
  // Metamon
  drawMeta();
  // Room outlines
  cx.strokeStyle='rgba(60,40,20,0.4)'; cx.lineWidth=1.5;
  [[iso(0,0,0),iso(RW,0,0)],[iso(0,0,0),iso(0,RD,0)],[iso(0,0,0),iso(0,0,RH)],
   [iso(RW,0,0),iso(RW,0,RH)],[iso(0,0,RH),iso(RW,0,RH)],[iso(0,0,RH),iso(0,RD,RH)],
   [iso(0,RD,0),iso(RW,RD,0)],[iso(RW,0,0),iso(RW,RD,0)]
  ].forEach(function(e){cx.beginPath();cx.moveTo(sn(e[0].x),sn(e[0].y));cx.lineTo(sn(e[1].x),sn(e[1].y));cx.stroke();});
}

function drawWindow(gx,gy,gz) {
  var ww=1.8, wh=2.0;
  var tl=iso(gx,gy,gz+wh),tr=iso(gx+ww,gy,gz+wh),bl=iso(gx,gy,gz),br=iso(gx+ww,gy,gz);
  var g=cx.createLinearGradient(sn(bl.x),sn(bl.y),sn(tr.x),sn(tr.y));
  g.addColorStop(0,'#aad8ff');g.addColorStop(1,'#ddf0ff');
  poly([tl,tr,br,bl],g,null);
  cx.strokeStyle='#7a5030';cx.lineWidth=2;
  [[tl,tr],[tr,br],[br,bl],[bl,tl]].forEach(function(e){cx.beginPath();cx.moveTo(sn(e[0].x),sn(e[0].y));cx.lineTo(sn(e[1].x),sn(e[1].y));cx.stroke();});
  var ml=iso(gx,gy,gz+wh/2),mr=iso(gx+ww,gy,gz+wh/2),mt=iso(gx+ww/2,gy,gz+wh),mb=iso(gx+ww/2,gy,gz);
  cx.lineWidth=1.5;
  [[ml,mr],[mt,mb]].forEach(function(e){cx.beginPath();cx.moveTo(sn(e[0].x),sn(e[0].y));cx.lineTo(sn(e[1].x),sn(e[1].y));cx.stroke();});
  // Curtains
  poly([iso(gx-0.3,gy,gz+wh+0.2),iso(gx+0.2,gy,gz+wh+0.2),iso(gx+0.2,gy,gz-0.2),iso(gx-0.3,gy,gz-0.2)],'rgba(255,150,180,0.55)',null);
  poly([iso(gx+ww-0.2,gy,gz+wh+0.2),iso(gx+ww+0.3,gy,gz+wh+0.2),iso(gx+ww+0.3,gy,gz-0.2),iso(gx+ww-0.2,gy,gz-0.2)],'rgba(255,150,180,0.55)',null);

function drawFurn(f) {

function drawMeta() {
  var p=iso(metaS.gx,metaS.gy,0);
  var mw=46,mh=42;
  var bob=Math.sin(Date.now()/520)*2;
  if(metaImg.complete&&metaImg.naturalWidth>0){
    cx.save();
    if(metaS.dir<0){cx.translate(sn(p.x)*2,0);cx.scale(-1,1);}
    cx.imageSmoothingEnabled=false;
    cx.drawImage(metaImg,sn(p.x)-mw/2,sn(p.y)-mh+bob,mw,mh);
    cx.restore();
  }
  var exprMap = {happy:'♥',sleepy:'z',excited:'!',shy:'~'};
  var sym = exprMap[metaS.expr];
  if(sym){
    var bx=sn(p.x)+mw*0.28,by=sn(p.y)-mh-4+bob;
    cx.fillStyle='#fff';cx.fillRect(bx,by-11,13,13);
    cx.strokeStyle='#8B6F47';cx.lineWidth=0.8;cx.strokeRect(bx,by-11,13,13);
    cx.fillStyle='#a060c8';cx.font='bold 9px monospace';cx.textAlign='center';
    cx.fillText(sym,bx+6.5,by);
  }
}

function aiStep() {
  var dx=metaS.tx-metaS.gx,dy=metaS.ty-metaS.gy;
  var d=Math.sqrt(dx*dx+dy*dy);
  if(d<0.08){
    metaS.gx=metaS.tx;metaS.gy=metaS.ty;
    if(metaS.target){setSpeech(metaS.target.interact);metaS.target=null;}
    metaS.idle--;
    if(metaS.idle<=0)decide();
  } else {
    metaS.dir=dx>0?-1:1;
    metaS.gx+=dx/d*metaS.spd;metaS.gy+=dy/d*metaS.spd;
  }
}

function decide() {
  if(roomFurns.length>0&&Math.random()<0.45){
    var f=roomFurns[Math.floor(Math.random()*roomFurns.length)];
    metaS.tx=f.gx+f.gw/2;metaS.ty=f.gy+f.gd/2+0.7;metaS.target=f;
  } else {
    metaS.tx=0.5+Math.random()*(RW-1);metaS.ty=0.5+Math.random()*(RD-1);metaS.target=null;
  }
  metaS.idle=40+Math.random()*60;
  if(Math.random()<0.2){
    var ex=['happy','sleepy','excited','shy','normal'];
    metaS.expr=ex[Math.floor(Math.random()*ex.length)];
    setTimeout(function(){metaS.expr='normal';},1800);
  }
}

var lt=0;
function loop(ts){
  if(ts-lt>50){lt=ts;aiStep();drawRoom();}
  requestAnimationFrame(loop);
}

function setShop(t){
  shopTab=t;
  document.querySelectorAll('.sht').forEach(function(el,i){el.classList.toggle('on',['f','s'][i]===t);});
  renderShop();
}
function renderShop(){
  var g=document.getElementById('shop-grid');g.innerHTML='';
  document.getElementById('shop-ttl').textContent=shopTab==='f'?'🛋️ 가구 상점 (40종)':'🍿 간식 코너 (12종)';
  var items=shopTab==='f'?FURNITURE:SNACKS;
  items.forEach(function(item){
    var owned=S.owned[item.id],placed=S.placed[item.id];
    var locked=(item.unlock!=null&&S.pomoCount<item.unlock);
    var canBuy=!owned&&S.coins>=item.cost&&!locked;
    var el=document.createElement('div');
    var cls='sc'+(placed?' pl':owned?' ow':locked?' lk':!canBuy?' np':'');
    el.className=cls;
    var costTxt=locked?('🔒'+item.unlock+'회'):owned?'보유중':('🪙'+item.cost);
    var costCol=owned?'color:var(--gn)':'';
    el.innerHTML='<div class="se">'+item.emoji+'</div><div class="sn">'+item.name+'</div><div class="sp" style="'+costCol+'">'+costTxt+'</div>'+(placed?'<div class="sbg pl">배치</div>':owned?'<div class="sbg ow">보유</div>':'');
    if(!locked){
      if(shopTab==='f'){
        if(placed) el.onclick=(function(id){return function(){removeFurn(id);};})(item.id);
        else if(owned) el.onclick=(function(id){return function(){placeFurn(id);};})(item.id);
        else if(canBuy) el.onclick=(function(id){return function(){buyFurn(id);};})(item.id);
      } else {
        if(canBuy) el.onclick=(function(sn2){return function(){buySnack(sn2);};})(item);
      }
    }
    g.appendChild(el);
  });
}
function buyFurn(id){
  var f=FURNITURE.find(function(x){return x.id===id;});
  if(!f||S.coins<f.cost||S.owned[id])return;
  S.coins-=f.cost;S.owned[id]=true;save();updateBadges();renderShop();
  setSpeech(f.emoji+' '+f.name+' 샀어!! 어머 방에 놓아줘~ 😍');showToast(f.emoji+' 구매!');
}
function placeFurn(id){
  if(!S.owned[id]||S.placed[id])return;
  S.placed[id]=true;save();initRoom();renderShop();
  var f=FURNITURE.find(function(x){return x.id===id;});
  setSpeech(f.emoji+' '+f.name+' 놓았어!! 방이 너무 예쁘다!! 🏠');
  showToast(f.emoji+' 배치!');S.mood=Math.min(100,S.mood+5);applyMood();spawnFx(f.emoji);
}
function removeFurn(id){
  delete S.placed[id];save();initRoom();renderShop();showToast('치웠어!');
}
function buySnack(sn2){
  if(S.coins<sn2.cost)return;
  S.coins-=sn2.cost;S.mood=Math.min(100,S.mood+sn2.mood);
  save();updateBadges();applyMood();renderShop();
  setSpeech(sn2.msg);metaS.expr='happy';setTimeout(function(){metaS.expr='normal';},2500);
  spawnFx(sn2.emoji);showToast(sn2.emoji+' 기분 +'+sn2.mood+'!');
}

function onDone(){
  var isBreak=(curMode==='s'||curMode==='l');
  playDing();
  if(!isBreak){
    S.pomoCount++;S.coins+=10;S.mood=Math.min(100,S.mood+12);
    var td=todayKey();
    if(!S.log[td])S.log[td]={pomos:0,tasks:[]};
    S.log[td].pomos++;S.log[td].tasks=todayTasks.map(function(t){return Object.assign({},t);});
    save();updateBadges();applyMood();renderPomoDots();renderShop();
    spawnConfetti();metaS.expr='excited';setTimeout(function(){metaS.expr='normal';},4000);
    if(autoMode){cyclePos++;if(cyclePos>=CYCLE.length)cyclePos=0;renderChain();}
    var praise=PRAISES[Math.floor(Math.random()*PRAISES.length)];
    var pt=praise[0],pe=praise[1];
    var doneTask=todayTasks.slice().reverse().find(function(t){return t.done;});
    var pendTask=todayTasks.find(function(t){return !t.done;});
    var coTask=document.getElementById('co-task');
    var taskMsg='';
    if(doneTask){coTask.textContent='"'+doneTask.text+'" 완료했구나!! 대단해!! '+pe;coTask.style.display='block';taskMsg='"'+doneTask.text+'" 완료했구나!! 정말 대단해!! '+pe;}
    else if(pendTask){coTask.textContent='"'+pendTask.text+'" 열심히 했지?! 잘했어!! '+pe;coTask.style.display='block';taskMsg='"'+pendTask.text+'" 열심히 했지?! 잘했어!! '+pe;}
    else{coTask.style.display='none';}
    document.getElementById('co-msg').textContent=pt+' '+pe;
    setSpeech(taskMsg||(pt+' '+pe));
    var nf=FURNITURE.find(function(f){return f.unlock===S.pomoCount;});
    var rw=document.getElementById('co-rw');
    if(nf){rw.style.display='block';document.getElementById('co-rw-e').textContent=nf.emoji;document.getElementById('co-rw-n').textContent=nf.name+' 해금!';}
    else rw.style.display='none';
    document.getElementById('co').classList.add('on');
  } else {
    showToast('휴식 끝! 다시 집중 고고~ 💪');
    if(autoMode){cyclePos++;if(cyclePos>=CYCLE.length)cyclePos=0;renderChain();setMode(CYCLE[cyclePos]);}

  }
}

  document.getElementById('co').classList.remove('on');

function playDing(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach(function(fr,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=fr;
      var t=ac.currentTime+i*0.18;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.26,t+0.05);g.gain.exponentialRampToValueAtTime(0.001,t+0.65);
      o.start(t);o.stop(t+0.65);
    });
  }catch(e){}
}

// ── CALENDAR ──────────────────────────────────
function calNav(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}calSel=null;renderCal();}
function renderCal(){
  var now=new Date();
  document.getElementById('cal-ttl').textContent=calY+'년 '+(calM+1)+'월';
  var prefix=calY+'-'+String(calM+1).padStart(2,'0')+'-';
  var mp=0,mt=0,md=0;
  Object.entries(S.log).forEach(function(e){if(e[0].startsWith(prefix)){mp+=e[1].pomos||0;if(e[1].tasks){mt+=e[1].tasks.length;md+=e[1].tasks.filter(function(t){return t.done;}).length;}}});
  document.getElementById('mon-sum').innerHTML='<div class="ms-bx"><div class="ms-n">'+mp+'</div><div class="ms-l">🍅 뽀모</div></div><div class="ms-bx"><div class="ms-n">'+mt+'</div><div class="ms-l">📝 할 일</div></div><div class="ms-bx"><div class="ms-n">'+md+'</div><div class="ms-l">✅ 완료</div></div><div class="ms-bx"><div class="ms-n">'+mp*25+'</div><div class="ms-l">⏱ 분</div></div>';
  var grid=document.getElementById('cal-grid');grid.innerHTML='';
  var first=new Date(calY,calM,1),dow=first.getDay(),dim=new Date(calY,calM+1,0).getDate(),prev2=new Date(calY,calM,0).getDate();
  var total=Math.ceil((dow+dim)/7)*7;
  for(var i=0;i<total;i++){
    var d2,mo,yr,isO=false;
    if(i<dow){d2=prev2-dow+i+1;mo=calM-1;yr=calY;if(mo<0){mo=11;yr--;}isO=true;}
    else if(i>=dow+dim){d2=i-dow-dim+1;mo=calM+1;yr=calY;if(mo>11){mo=0;yr++;}isO=true;}
    else{d2=i-dow+1;mo=calM;yr=calY;}
    var key=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d2).padStart(2,'0');
    var dd=S.log[key];
    var isT=yr===now.getFullYear()&&mo===now.getMonth()&&d2===now.getDate();
    var c=document.createElement('div');
    c.className='cc'+(isO?' other':'')+(isT?' today':'')+(calSel===key?' sel':'')+(dd?' has':'');
    var inner='<div class="cdate">'+d2+'</div>';
    if(dd&&dd.pomos>0){inner+='<div class="cpdots">'+'<div class="cpdot"></div>'.repeat(Math.min(dd.pomos,5))+'</div><div class="cpc">'+dd.pomos+'🍅</div>';}
    c.innerHTML=inner;
    (function(k,data){c.onclick=function(){selDay(k,data);};})(key,dd);
    grid.appendChild(c);
  }
}
function selDay(key,data){
  calSel=key;renderCal();
  var det=document.getElementById('day-det');det.style.display='block';
  var pts=key.split('-'),lbl=pts[0]+'년 '+parseInt(pts[1])+'월 '+parseInt(pts[2])+'일';
  if(!data||(!data.pomos&&(!data.tasks||!data.tasks.length))){det.innerHTML='<div class="dd-ttl">'+lbl+'</div><div class="de">기록이 없어요 🌙</div>';return;}
  var p=data.pomos||0,tasks=data.tasks||[],done=tasks.filter(function(t){return t.done;}).length;
  var th=tasks.length?tasks.map(function(t){return '<div class="dt-i"><div class="dt-d '+(t.done?'dn':'pd')+'"></div><span style="flex:1;font-size:10px">'+t.text+'</span><span style="font-size:9px;color:var(--mu)">'+(t.time||'')+'</span></div>';}).join(''):'<div class="de">할 일 없음</div>';
  det.innerHTML='<div class="dd-ttl"><span>'+lbl+'</span><span style="font-size:9px;color:var(--mu)">'+tasks.length+'개</span></div><div class="dd-stats"><div class="st-bx"><div class="st-n">'+p+'</div><div class="st-l">🍅 뽀모</div></div><div class="st-bx"><div class="st-n">'+p*25+'</div><div class="st-l">⏱ 분</div></div><div class="st-bx"><div class="st-n">'+done+'/'+tasks.length+'</div><div class="st-l">✅ 완료</div></div></div><div class="dtl">'+th+'</div>';
}

// ── CHAT (ESFJ 메타몽 - Anthropic API) ──────────────────────────────────
function sendChat(){
  var inp=document.getElementById('chat-inp');
  var txt=inp.value.trim();if(!txt)return;
  inp.value='';addMsg('u',txt);
  chatHistory.push({role:'user',content:txt});
  var ty=document.createElement('div');ty.className='msg m';ty.id='ty-msg';
  ty.innerHTML='<div class="m-av"><img src="'+MI+'" style="width:24px;height:24px;object-fit:contain"></div><div class="typing"><div class="td3"></div><div class="td3"></div><div class="td3"></div></div>';
  document.getElementById('msgs').appendChild(ty);scrollChat();
  var td=todayKey();
  var sys='너는 포켓몬 "메타몽"이야. ESFJ 성격으로 행동해.\nESFJ: 따뜻하고 공감 잘하고, 상대방을 엄청 챙겨주고, 칭찬을 아끼지 않고, "어머!" "헐!" 같은 감탄사를 씀.\n말투: 반말, 짧고 귀엽게, 이모지 1~2개, 따뜻하고 친근하게. 한국어만. 3줄 이내.\n상황: 총 뽀모도로 '+S.pomoCount+'회, 기분 '+S.mood+'/100, 코인 '+S.coins+'뽀모.\n오늘 할 일: '+todayTasks.map(function(t){return (t.done?'[완료]':'[진행중]')+t.text;}).join(', ')+'.\n방 가구: '+Object.keys(S.placed).join(', ')+'.\n순위: '+(S.rivals.filter(function(r){return r.pomos>S.pomoCount;}).length+1)+'위.';
  var body=JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:sys,messages:chatHistory});
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:body
  }).then(function(res){return res.json();}).then(function(data){
    var reply=(data.content&&data.content[0]&&data.content[0].text)||'메타~ 잠깐 말 못 했어 😅';
    chatHistory.push({role:'assistant',content:reply});
    var el=document.getElementById('ty-msg');if(el)el.remove();
    addMsg('m',reply);
  }).catch(function(e){
    var el=document.getElementById('ty-msg');if(el)el.remove();
    addMsg('m','어머 연결이 잠깐 끊겼어 😅 다시 말해줘!');
  });
}
function addMsg(role,txt){
  var msgs=document.getElementById('msgs');
  var now=new Date(),t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var el=document.createElement('div');el.className='msg '+(role==='u'?'u':'m');
  if(role==='m'){el.innerHTML='<div class="m-av"><img src="'+MI+'" style="width:24px;height:24px;object-fit:contain"></div><div><div class="m-bub">'+txt+'</div><div class="m-t">'+t+'</div></div>';}
  else{el.innerHTML='<div><div class="m-bub">'+txt+'</div><div class="m-t" style="text-align:right">'+t+'</div></div>';}
  msgs.appendChild(el);scrollChat();
}
function scrollChat(){setTimeout(function(){document.getElementById('msgs').scrollTop=9999;},50);}

// ── MOOD / SPEECH / FX ──────────────────────────────────
function applyMood(){document.getElementById('mf').style.width=S.mood+'%';document.getElementById('mp').textContent=S.mood+'%';}
function setSpeech(txt){var el=document.getElementById('speech');el.style.opacity='0';setTimeout(function(){el.textContent=txt;el.style.opacity='1';},200);}
function spawnFx(em){
  for(var i=0;i<5;i++){
    (function(i2){setTimeout(function(){var el=document.createElement('div');el.className='ffx';el.textContent=em;el.style.left=(20+Math.random()*60)+'vw';el.style.top=(30+Math.random()*40)+'vh';document.body.appendChild(el);setTimeout(function(){el.remove();},1200);},i2*90);})(i);
  }
}
function spawnConfetti(){
  var cols=['#ff6eb4','#b57bee','#ffd93d','#26de81','#ff9f43','#45aaf2'];
  for(var i=0;i<32;i++){
    (function(i2){setTimeout(function(){var el=document.createElement('div');el.className='cfp';el.style.cssText='left:'+Math.random()*100+'vw;top:-18px;background:'+cols[Math.floor(Math.random()*cols.length)]+';width:'+(5+Math.random()*7)+'px;height:'+(5+Math.random()*7)+'px;border-radius:'+(Math.random()>.5?'50%':'2px')+';animation-duration:'+(1.4+Math.random()*1.4)+'s;animation-delay:'+(Math.random()*.45)+'s;';document.body.appendChild(el);setTimeout(function(){el.remove();},3000);},i2*26);})(i);
  }
}
var ttmr;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(ttmr);ttmr=setTimeout(function(){t.classList.remove('on');},2100);}

</script>
